name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: uv sync --extra dev

    # build.py shells out to pnpm to build the React frontend (frontend/) before
    # PyInstaller packaging - see build.py's _build_frontend().
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: latest

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'
        cache-dependency-path: frontend/pnpm-lock.yaml

    - name: Bump version
      id: bump_version
      run: uv run python .github/scripts/bump_version.py "${{ github.event.inputs.version_bump }}"

    - name: Update uv.lock
      run: uv lock

    - name: Build standalone executable (PyInstaller)
      run: uv run python build.py

    - name: Build installer (Inno Setup)
      shell: pwsh
      run: |
        $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
        & $iscc /DAppVersion="${{ steps.bump_version.outputs.new_version }}" installer.iss
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        # Not yet code-signed. An unsigned exe/installer is a common AV/SmartScreen
        # false-positive trigger; signing with an Authenticode cert (stored as a CI
        # secret) here would be the next step if that becomes a problem in practice.

    # Commit and tag only after both build steps succeed.
    # This keeps the repo clean: a failed build leaves no orphaned version bump.
    - name: Commit and tag version bump
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add pyproject.toml uv.lock
        git commit -m "Bump version to ${{ steps.bump_version.outputs.new_version }}"
        git tag "v${{ steps.bump_version.outputs.new_version }}"
        git push origin HEAD:${{ github.ref_name }}
        git push origin "v${{ steps.bump_version.outputs.new_version }}"

    - name: Generate release notes
      id: release_notes
      run: uv run python .github/scripts/generate_release_notes.py --new-version "${{ steps.bump_version.outputs.new_version }}"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.bump_version.outputs.new_version }}
        name: Release v${{ steps.bump_version.outputs.new_version }}
        body: ${{ steps.release_notes.outputs.notes }}
        files: ./dist/grammar-ai-installer-windows-x64-v${{ steps.bump_version.outputs.new_version }}.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
